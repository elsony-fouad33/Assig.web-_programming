<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register Page</title>

    <style>
      body {
        margin: 0;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background-color: rgba(211, 211, 211, 0.448);
        color: #222;
      }

      .container {
        max-width: 460px;
        margin: 40px auto;
        padding: 22px 24px;
        background: rgba(255, 255, 255, 0.9);
        border-radius: 14px;
        box-shadow: 0 10px 22px rgba(0, 0, 0, 0.15);
      }

      h1 {
        color: gray;
        margin-bottom: 8px;
      }

      h2 {
        color: rgba(29, 29, 200, 0.65);
        margin: 0 0 18px;
      }

      h3 {
        color: orange;
        margin: 20px 0 14px;
      }

      p {
        color: blueviolet;
        margin: 18px 0 0;
      }

      .header-links {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        margin: 18px 0 26px;
      }

      .header-links a {
        text-decoration: none;
        color: #0073e6;
        font-weight: 600;
      }

      .header-links a.gmail-link {
        color: red;
      }

      .form-group {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .form-group input {
        padding: 10px 12px;
        border: 1px solid rgba(0, 0, 0, 0.25);
        border-radius: 8px;
        font-size: 1rem;
        outline: none;
      }

      .form-group input:focus {
        border-color: rgba(0, 123, 255, 0.75);
        box-shadow: 0 0 0 3px rgba(0, 123, 255, 0.18);
      }

      .form-group button {
        padding: 10px 14px;
        border: none;
        border-radius: 8px;
        background: #0b5ed7;
        color: white;
        font-weight: 600;
        cursor: pointer;
      }

      .form-group button:hover {
        background: #0a58ca;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Welcome to my Register Page</h1>
      <hr />

      <div>
        <h2>Please fill in the form below to create an account</h2>
      </div>

      <div class="header-links">
        <a href="#Gmail">Home</a>
        <a
          href="https://mail.google.com/mail/u/0/#inbox"
          target="_self"
          class="gmail-link"
          >Go to Gmail!</a
        >
      </div>

      <section class="form-group">
        <h3>Register here</h3>
        <input type="text" placeholder="Enter your name" />
        <input type="email" placeholder="Enter your email" />
        <input type="password" placeholder="Enter your password" />
        <button type="button">Register please</button>
        <p>this page is specialized to register new users</p>
      </section>
    </div>
  </body>
</html>
