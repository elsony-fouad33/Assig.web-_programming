<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register Page</title>

    <style>
      body {
        margin: 0;
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        background-color: transparent;
        color: #222;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .container {
        width: clamp(320px, 90vw, 720px);
        padding: 22px 24px;
        background: rgba(255, 255, 255, 0.9);
        border-radius: 14px;
        box-shadow: 0 10px 22px rgba(0, 0, 0, 0.15);
      }

      h1 {
        color: gray;
        margin-bottom: 8px;
      }

      h2 {
        color: rgba(29, 29, 200, 0.65);
        margin: 0 0 18px;
      }

      h3 {
        color: orange;
        margin: 20px 0 14px;
      }

      p {
        color: blueviolet;
        margin: 18px 0 0;
      }

      .header-links {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        margin: 18px 0 26px;
      }

      .header-links a {
        text-decoration: none;
        color: #0073e6;
        font-weight: 100;
      }

      .header-links a.gmail-link {
        color: red;
      }

      .form-group {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .form-group input {
        width: 100%;
        box-sizing: border-box;
        padding: 10px 12px;
        border: 1px solid rgba(0, 0, 0, 0.25);
        border-radius: 8px;
        font-size: 1rem;
        outline: none;
      }

      .form-group input:focus {
        border-color: rgba(0, 123, 255, 0.75);
        box-shadow: 0 0 0 3px rgba(0, 123, 255, 0.18);
      }

      .form-group button {
        padding: 10px 14px;
        border: none;
        border-radius: 8px;
        background: #0b5ed7;
        color: white;
        font-weight: 100;
        cursor: pointer;
      }

      .form-group button:hover {
        background: #0a58ca;
      }
    </style>
  </head>
  <body
    style="
      background-image: url(&quot;https://images.unsplash.com/photo-1507525428034-b723cf961d3e&quot;);
      background-size: cover;
      background-position: center;
    "
  >
    <div class="container">
      <h1>Welcome to my Register Page</h1>
      <hr />

      <div>
        <h2>Please fill in the form below to create an account</h2>
      </div>

      <div class="header-links">
        <a href="#Gmail">Home</a>
        <a
          href="https://mail.google.com/mail/u/0/#inbox"
          target="_self"
          class="gmail-link"
          >Go to Gmail!</a
        >
      </div>

      <section class="form-group">
        <h3>Register here</h3>
        <form id="registerForm" novalidate>
          <label for="userName">Name</label>
          <input id="userName" name="name" type="text" placeholder="Enter your name" required autocomplete="name" />

          <label for="userEmail">Email</label>
          <input id="userEmail" name="email" type="email" placeholder="Enter your email" required autocomplete="email" />

          <label for="userPass">Password</label>
          <input id="userPass" name="password" type="password" placeholder="Enter your password" required minlength="6" autocomplete="new-password" />

          <label for="userPassConfirm">Confirm password</label>
          <input id="userPassConfirm" name="confirmPassword" type="password" placeholder="Re-enter your password" required minlength="6" autocomplete="new-password" />

          <button type="submit" id="regBtn">Register</button>
          <p id="registerMessage" class="register-message" aria-live="polite"></p>
        </form>
        <p>this page is specialized to register new users</p>
      </section>
    </div>

    <script>
      const registerForm = document.getElementById('registerForm');
      const registerMessage = document.getElementById('registerMessage');

      registerForm.addEventListener('submit', (event) => {
        event.preventDefault();

        const name = registerForm.elements.name.value.trim();
        const email = registerForm.elements.email.value.trim();
        const password = registerForm.elements.password.value;
        const confirmPassword = registerForm.elements.confirmPassword.value;

        if (!name || !email || !password || !confirmPassword) {
          registerMessage.textContent = 'Please fill in all fields.';
          registerMessage.style.color = 'red';
          return;
        }

        if (password.length < 6) {
          registerMessage.textContent = 'Password must be at least 6 characters.';
          registerMessage.style.color = 'red';
          return;
        }

        if (password !== confirmPassword) {
          registerMessage.textContent = 'Passwords do not match. Please try again.';
          registerMessage.style.color = 'red';
          return;
        }

        registerMessage.textContent = `Thanks, ${name}! Your registration is complete.`;
        registerMessage.style.color = 'green';
        registerForm.reset();

        // Optional: redirect to home after a short delay
        setTimeout(() => {
          window.location.href = 'index.html';
        }, 1200);
      });
    </script>
  </body>
</html>
